<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 转换 · MD → PDF / HTML</title>
<link rel="stylesheet" href="libs/github.min.css">
<style>
  /* ===== 设计令牌（与工具箱统一） ===== */
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1f2329;
    --text-muted: #8a909a;
    --accent: #2f6df6;
    --accent-hover: #1f57d8;
    --danger: #e5484d;
    --code-bg: #1e1e2e;
    --code-text: #e6e6e6;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --radius: 8px;
  }
  html[data-theme="dark"] {
    --bg: #16171a;
    --panel: #1d1f23;
    --border: #2c2f36;
    --text: #e7e9ee;
    --text-muted: #8a909a;
    --accent: #4d86ff;
    --accent-hover: #6c98ff;
    --danger: #ff6166;
    --code-bg: #0e0f13;
    --code-text: #d7d7db;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background .2s, color .2s;
  }

  /* ===== 顶部栏 ===== */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .logo {
    font-weight: 700;
    font-size: 15px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo .dot { color: var(--accent); }
  .back-link {
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel);
    transition: all .15s;
    white-space: nowrap;
  }
  .back-link:hover { border-color: var(--accent); }
  .spacer { flex: 1; }

  .btn {
    padding: 7px 13px;
    font-size: 13px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 7px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .15s;
    font-weight: 500;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
  .btn.ghost { border-style: dashed; }
  .btn.icon-only { padding: 7px 9px; }

  .upload-group { display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ===== 主体 ===== */
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane.left { border-right: 1px solid var(--border); max-width: 50%; }
  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    min-height: 38px;
  }
  .pane-header .title { font-weight: 600; color: var(--text); font-size: 13px; }
  .pane-header .meta { font-variant-numeric: tabular-nums; }
  textarea#md-input {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    padding: 16px 18px;
    font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, Monaco, monospace;
    font-size: 13.5px;
    line-height: 1.7;
    background: var(--code-bg);
    color: var(--code-text);
    tab-size: 2;
  }
  .preview-wrap {
    flex: 1;
    overflow: auto;
    background: var(--bg);
  }
  #preview {
    background: var(--panel);
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 40px;
    min-height: 100%;
    box-shadow: var(--shadow);
  }
  .empty-hint {
    color: var(--text-muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 13px;
  }

  /* ===== 预览区 Markdown 排版 ===== */
  #preview h1, #preview h2, #preview h3, #preview h4 { margin: 1.2em 0 .5em; line-height: 1.3; }
  #preview h1 { font-size: 1.9em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  #preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  #preview h3 { font-size: 1.25em; }
  #preview p { margin: .7em 0; }
  #preview ul, #preview ol { margin: .6em 0; padding-left: 1.8em; }
  #preview li { margin: .25em 0; }
  #preview blockquote {
    margin: .8em 0; padding: .3em 1em;
    border-left: 4px solid var(--accent);
    background: var(--bg);
    color: var(--text-muted);
    border-radius: 0 6px 6px 0;
  }
  #preview code {
    font-family: "JetBrains Mono", Consolas, Monaco, monospace;
    font-size: .88em;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: .12em .4em;
    border-radius: 4px;
  }
  #preview pre {
    margin: .8em 0;
    padding: 14px 16px;
    background: var(--code-bg);
    border-radius: 8px;
    overflow-x: auto;
    line-height: 1.5;
  }
  #preview pre code { background: transparent; border: none; padding: 0; color: var(--code-text); font-size: .85em; }
  #preview img { max-width: 100%; border-radius: 6px; }
  #preview table { border-collapse: collapse; width: 100%; margin: .8em 0; font-size: .92em; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  #preview th { background: var(--bg); font-weight: 600; }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 1.4em 0; }
  #preview a { color: var(--accent); }

  /* ===== 拖拽高亮 ===== */
  textarea#md-input.drag-over { box-shadow: inset 0 0 0 2px var(--accent); }

  /* ===== 加载遮罩 ===== */
  #loading {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(12,13,18,.55);
    display: none;
    align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  #loading.show { display: flex; }
  .loading-box { background: var(--panel); padding: 28px 40px; border-radius: 12px; text-align: center; box-shadow: var(--shadow); }
  .spinner {
    width: 34px; height: 34px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-box p { font-size: 13px; color: var(--text-muted); }

  /* ===== toast ===== */
  #toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1f2329; color: #fff;
    padding: 9px 18px; border-radius: 8px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: all .25s; z-index: 300;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== 移动端 ===== */
  @media (max-width: 760px) {
    main { flex-direction: column; }
    .pane.left { max-width: none; border-right: none; border-bottom: 1px solid var(--border); min-height: 42%; }
    #preview { padding: 20px; }
    header { gap: 8px; }
  }
</style>
</head>
<body>
  <header>
    <a class="back-link" id="backLink" href="#" title="返回工具箱">← 工具箱</a>
    <div class="logo">📝 Markdown 转换 <span class="dot">·</span> MD → PDF / HTML</div>
    <div class="spacer"></div>

    <div class="upload-group">
      <button class="btn ghost" id="uploadMdBtn">📁 上传 .md</button>
      <input type="file" id="md-file" accept=".md,.markdown,.txt" style="display:none">
      <button class="btn ghost" id="uploadImgBtn">🖼 插入图片</button>
      <input type="file" id="img-file" accept="image/*" multiple style="display:none">
    </div>
    <div class="spacer"></div>

    <button class="btn" id="clearBtn">清空</button>
    <button class="btn" id="exportHtmlBtn">⬇ 导出 HTML</button>
    <button class="btn primary" id="exportPdfBtn">⬇ 导出 PDF</button>
    <button class="btn icon-only" id="themeToggle" title="切换主题">🌙</button>
  </header>

  <main>
    <section class="pane left">
      <div class="pane-header">
        <span class="title">Markdown 编辑器</span>
        <span class="meta" id="stat">0 字 · 0 行</span>
      </div>
      <textarea id="md-input" spellcheck="false" placeholder="在此输入或粘贴 Markdown，也可把 .md 文件直接拖进来…&#10;&#10;支持：标题 / 列表 / 代码块 / 表格 / 引用 / 图片 / 链接等 GFM 语法"></textarea>
    </section>

    <section class="pane right">
      <div class="pane-header">
        <span class="title">预览</span>
        <span class="meta" id="hint">实时预览</span>
      </div>
      <div class="preview-wrap">
        <div id="preview"><div class="empty-hint">在左侧输入 Markdown，右侧实时预览</div></div>
      </div>
    </section>
  </main>

  <div id="toast"></div>

  <div id="loading">
    <div class="loading-box">
      <div class="spinner"></div>
      <p id="loadingMsg">正在生成 PDF，请稍候…</p>
    </div>
  </div>

<script src="libs/marked.min.js"></script>
<script src="libs/highlight.min.js"></script>
<script src="libs/html2pdf.bundle.min.js"></script>
<script>
/* ============================================================
   Markdown 转换工具（单文件版）
   · 编辑 + 实时预览（GFM + 代码高亮）
   · 上传 .md / 拖拽 .md / 插入本地图片（base64 内嵌）
   · 导出 HTML / PDF（纯前端，数据不出浏览器）
   ============================================================ */

const $ = (id) => document.getElementById(id);
const mdInput = $('md-input');
const preview = $('preview');
const stat = $('stat');
const toastEl = $('toast');

/* ---------- 主题 ---------- */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  $('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem('aitools-theme', t); } catch (e) {}
}
$('themeToggle').onclick = () => {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
};
// 被首页 iframe 嵌入时，隐藏「← 工具箱」返回按钮（由首页覆盖层提供返回）
if (window.self !== window.top) {
  const bl = document.querySelector('.back-link');
  if (bl) bl.style.display = 'none';
} else {
  // 直接访问时：计算到仓库根 index.html 的相对路径
  // 兼容 GitHub Pages (/ai-blog/...) 与本地 (./ 或 ../)
  const bl = document.getElementById('backLink');
  if (bl) {
    bl.addEventListener('click', (e) => {
      e.preventDefault();
      const path = location.pathname;                       // 如 /ai-blog/md2pdf/index.html
      const segs = path.split('/').filter(Boolean);          // ['ai-blog','md2pdf','index.html']
      const root = location.hostname.endsWith('github.io')  // Pages 站点：跳到 /<repo>/
        ? '/' + segs[0] + '/'
        : (segs.length > 1 ? '../' : '');                   // 本地：上一层（若已在根则不动）
      location.href = root + 'index.html';
    });
  }
}
let savedTheme = null;
try { savedTheme = localStorage.getItem('aitools-theme'); } catch (e) {}
if (savedTheme) applyTheme(savedTheme);
else applyTheme(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

/* ---------- toast ---------- */
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastEl._tm);
  toastEl._tm = setTimeout(() => toastEl.classList.remove('show'), 1800);
}

/* ---------- marked 配置（v15：highlight 选项已移除，改用渲染后高亮） ---------- */
marked.setOptions({ gfm: true, breaks: true });

/* ---------- 渲染 ---------- */
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function render() {
  const text = mdInput.value;
  // 字数 / 行数统计
  const lines = text ? text.split('\n').length : 0;
  stat.textContent = `${text.length} 字 · ${lines} 行`;

  if (!text.trim()) {
    preview.innerHTML = '<div class="empty-hint">在左侧输入 Markdown，右侧实时预览</div>';
    return;
  }
  try {
    preview.innerHTML = marked.parse(text);
    // 代码高亮
    preview.querySelectorAll('pre code').forEach((block) => {
      try { hljs.highlightElement(block); } catch (e) {}
    });
  } catch (e) {
    preview.innerHTML = `<div class="empty-hint" style="color:var(--danger)">解析出错：${escapeHtml(e.message || String(e))}</div>`;
  }
}

let debounceTimer = null;
mdInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 150);
});

/* ---------- 上传 / 拖拽 .md ---------- */
$('uploadMdBtn').onclick = () => $('md-file').click();
$('md-file').onchange = (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = (ev) => { mdInput.value = ev.target.result; render(); toast('已载入 ' + f.name); };
  reader.readAsText(f);
  e.target.value = '';
};

// 拖拽 .md / 图片进编辑器
['dragenter','dragover'].forEach(ev =>
  mdInput.addEventListener(ev, e => { e.preventDefault(); mdInput.classList.add('drag-over'); })
);
['dragleave','drop'].forEach(ev =>
  mdInput.addEventListener(ev, e => { e.preventDefault(); mdInput.classList.remove('drag-over'); })
);
mdInput.addEventListener('drop', e => {
  const files = e.dataTransfer && e.dataTransfer.files;
  if (!files || !files.length) return;
  const mdFile = Array.from(files).find(f => /\.(md|markdown|txt)$/i.test(f.name));
  const imgFiles = Array.from(files).filter(f => /^image\//i.test(f.type));
  if (mdFile) {
    const reader = new FileReader();
    reader.onload = ev => { mdInput.value = ev.target.result; render(); toast('已载入 ' + mdFile.name); };
    reader.readAsText(mdFile);
  }
  if (imgFiles.length) insertImages(imgFiles);
});

/* ---------- 插入图片（base64 内嵌） ---------- */
$('uploadImgBtn').onclick = () => $('img-file').click();
$('img-file').onchange = (e) => {
  if (e.target.files.length) insertImages(Array.from(e.target.files));
  e.target.value = '';
};

function insertImages(files) {
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      // 在光标处（或末尾）插入图片 markdown
      const alt = file.name.replace(/\.[^.]+$/, '');
      const md = `\n\n![${alt}](${ev.target.result})\n\n`;
      const start = mdInput.selectionStart;
      const end = mdInput.selectionEnd;
      mdInput.value = mdInput.value.slice(0, start) + md + mdInput.value.slice(end);
      mdInput.selectionStart = mdInput.selectionEnd = start + md.length;
      done++;
      if (done === files.length) { render(); toast(`已插入 ${files.length} 张图片（内嵌 base64）`); }
    };
    reader.readAsDataURL(file);
  });
}

/* ---------- 清空 ---------- */
$('clearBtn').onclick = () => {
  if (!mdInput.value.trim() || confirm('确认清空编辑器内容？')) {
    mdInput.value = ''; render(); toast('已清空');
  }
};

/* ---------- 导出 HTML（自包含单文件） ---------- */
$('exportHtmlBtn').onclick = () => {
  const text = mdInput.value.trim();
  if (!text) { toast('请先输入 Markdown 内容'); return; }
  const bodyHtml = marked.parse(text);
  const fullHtml =
`<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 导出</title>
<style>
  body { font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; line-height: 1.7; color: #1f2329; max-width: 820px; margin: 0 auto; padding: 40px 24px; }
  h1,h2 { border-bottom: 1px solid #e2e5ea; padding-bottom: .3em; }
  blockquote { margin: .8em 0; padding: .3em 1em; border-left: 4px solid #2f6df6; background: #f6f7f9; color: #555; }
  pre { background: #1e1e2e; color: #e6e6e6; padding: 14px 16px; border-radius: 8px; overflow-x: auto; }
  code { font-family: Consolas, Monaco, monospace; font-size: .9em; }
  pre code { background: transparent; }
  :not(pre) > code { background: #f6f7f9; padding: .12em .4em; border-radius: 4px; }
  img { max-width: 100%; border-radius: 6px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #e2e5ea; padding: 8px 12px; text-align: left; }
  th { background: #f6f7f9; }
  a { color: #2f6df6; }
</style>
</head>
<body>
${bodyHtml}
</body>
</html>`;
  downloadBlob(new Blob([fullHtml], { type: 'text/html;charset=utf-8' }), 'markdown_export.html');
  toast('已导出 HTML');
};

/* ---------- 导出 PDF（html2pdf，纯前端） ---------- */
$('exportPdfBtn').onclick = () => {
  const text = mdInput.value.trim();
  if (!text) { toast('请先输入 Markdown 内容'); return; }
  $('loading').classList.add('show');

  // 构造一个离屏容器用于 PDF 渲染
  const container = document.createElement('div');
  container.style.position = 'absolute';
  container.style.left = '-99999px';
  container.style.top = '0';
  container.style.width = '780px';
  container.style.padding = '40px 48px';
  container.style.background = '#ffffff';
  container.style.color = '#1f2329';
  container.style.fontFamily = '"PingFang SC", "Microsoft YaHei", Arial, sans-serif';
  container.style.lineHeight = '1.7';
  container.innerHTML = marked.parse(text);
  // 代码高亮
  container.querySelectorAll('pre code').forEach(block => { try { hljs.highlightElement(block); } catch (e) {} });
  // 排版样式（与预览一致）
  const st = document.createElement('style');
  st.textContent =
    'h1,h2{border-bottom:1px solid #e2e5ea;padding-bottom:.3em;}' +
    'blockquote{margin:.8em 0;padding:.3em 1em;border-left:4px solid #2f6df6;background:#f6f7f9;color:#555;}' +
    'pre{background:#1e1e2e;color:#e6e6e6;padding:14px;border-radius:8px;overflow-x:auto;}' +
    'code{font-family:Consolas,monospace;font-size:.9em;}' +
    'pre code{background:transparent;}' +
    ':not(pre)>code{background:#f6f7f9;padding:.12em .4em;border-radius:4px;}' +
    'img{max-width:100%;}' +
    'table{border-collapse:collapse;width:100%;}' +
    'th,td{border:1px solid #e2e5ea;padding:8px 12px;}' +
    'th{background:#f6f7f9;}';
  container.appendChild(st);
  document.body.appendChild(container);

  const opt = {
    margin: [12, 12, 14, 12],
    filename: 'markdown_export.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opt).from(container).save()
    .then(() => { document.body.removeChild(container); $('loading').classList.remove('show'); toast('已导出 PDF'); })
    .catch(err => {
      document.body.removeChild(container);
      $('loading').classList.remove('show');
      console.error('PDF 生成失败:', err);
      toast('PDF 生成失败，请查看控制台');
    });
};

/* ---------- 下载工具 ---------- */
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ---------- 启动：载入示例 ---------- */
const EXAMPLE =
`# Markdown 转换工具示例

支持 **粗体**、*斜体*、~~删除线~~、\`行内代码\` 与 [链接](https://github.com)。

## 列表

- 无序项目 A
- 无序项目 B
  - 嵌套子项

1. 有序第一
2. 有序第二

## 代码块

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
console.log(greet('World'));
\`\`\`

## 表格

| 工具 | 格式 | 说明 |
| --- | --- | --- |
| 导出 HTML | .html | 自包含单文件 |
| 导出 PDF | .pdf | A4 纯前端生成 |

## 引用

> 数据不出浏览器，所有转换均在本地完成。

---

点击右上角 **导出 PDF / 导出 HTML** 即可下载。`;

mdInput.value = EXAMPLE;
render();
</script>
</body>
</html>
